      key_events:
        - "一起打篮球"
        - "分享对篮球的热爱"
        - "友谊建立"

    - chapter: 3
      title: "告别与承诺"
      summary: "学期结束，两人约定保持联系"
      key_events:
        - "学期结束"
        - "交换联系方式"
        - "承诺友谊不变"

    - chapter: 4
      title: "新的开始"
      summary: "高考结束，两人分别考上大学，友谊延续"
      key_events:
